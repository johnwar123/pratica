<!DOCTYPE html>
<html>
  <head>
    <title>Contato</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      body {
        background-color: black;
        color: white;
        text-align: center;
        font-family: Arial;
      }
      nav {
        background-color: red;
        padding: 15px;
      }
      nav a {
        color: white;
        text-decoration: none;
        font-size: 20px;
        margin: 0 20px;
      }
      h1 {
        color: red;
        margin-top: 50px;
      }
      input, textarea {
        width: 80%;
        padding: 10px;
        margin: 10px 0;
        font-size: 18px;
        border-radius: 5px;
        border: none;
      }
      button {
        font-size: 20px;
        padding: 10px 30px;
        background-color: red;
        color: white;
        border: none;
        cursor: pointer;
        margin-top: 10px;
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="index.html">Início</a>
      <a href="sobre.html">Sobre</a>
      <a href="contato.html">Contato</a>
    </nav>
    <h1>📩 Contato</h1>
    <p>Mande sua mensagem sobre os aliens!</p>

    <input type="text" id="nome" placeholder="Seu nome">
    <br>
    <textarea id="mensagem" rows="5" placeholder="Sua mensagem"></textarea>
    <br>
    <button onclick="enviar()">Enviar</button>

    <script>
      function enviar() {
        var nome = document.getElementById("nome").value;
        var mensagem = document.getElementById("mensagem").value;
        if (nome == "" || mensagem == "") {
          alert("Preencha todos os campos!")
        } else {
          alert("Obrigado " + nome + "! Mensagem recebida!")
        }
      }
    </script>
  </body>
</html>
