<!DOCTYPE html>
<html>
  <head>
    <title>Galeria Alien</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      body {
        background-color: black;
        color: white;
        text-align: center;
        font-family: Arial;
      }
      nav {
        background-color: red;
        padding: 15px;
      }
      nav a {
        color: white;
        text-decoration: none;
        font-size: 20px;
        margin: 0 15px;
      }
      nav a:hover {
        color: black;
      }
      h1 {
        color: red;
        margin-top: 30px;
      }
      .galeria {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
        padding: 30px;
      }
      .galeria img {
        width: 250px;
        height: 200px;
        object-fit: cover;
        border: 3px solid red;
        border-radius: 10px;
        cursor: pointer;
        transition: transform 0.3s;
      }
      .galeria img:hover {
        transform: scale(1.1);
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="index.html">Início</a>
      <a href="sobre.html">Sobre</a>
      <a href="contato.html">Contato</a>
      <a href="jogo.html">Jogo</a>
      <a href="cronometro.html">Cronômetro</a>
      <a href="galeria.html">Galeria</a>
    </nav>
    <h1>👽 Galeria Alien</h1>
    <p>Fotos capturadas pelos agentes do GOV.BR</p>

    <div class="galeria">
    
  <div style="width:250px; height:200px; border:3px solid red; border-radius:10px; font-size:80px; display:flex; align-items:center; justify-content:center; cursor:pointer;" onclick="ampliar(this)">👽</div>
  <div style="width:250px; height:200px; border:3px solid red; border-radius:10px; font-size:80px; display:flex; align-items:center; justify-content:center; cursor:pointer;" onclick="ampliar(this)">🛸</div>
  <div style="width:250px; height:200px; border:3px solid red; border-radius:10px; font-size:80px; display:flex; align-items:center; justify-content:center; cursor:pointer;" onclick="ampliar(this)">🌍</div>

    </div>

    <script>
      function ampliar(img) {
        img.style.width = img.style.width == "400px" ? "250px" : "400px";
        img.style.height = img.style.height == "350px" ? "200px" : "350px";
      }
    </script>
  </body>
</html>
