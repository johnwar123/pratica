<!DOCTYPE html>
<html>
  <head>
    <title>GRANDE NOTÍCIA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      body {
        background-color: black;
        color: red;
        text-align: center;
        font-family: Arial;
      }
      nav {
        background-color: red;
        padding: 15px;
      }
      nav a {
        color: white;
        text-decoration: none;
        font-size: 20px;
        margin: 0 20px;
      }
      nav a:hover {
        color: black;
      }
      h1 {
        font-size: 40px;
        margin-top: 50px;
        animation: piscar 1s infinite;
      }
      p {
        font-size: 20px;
        color: white;
      }
      button {
        font-size: 20px;
        padding: 10px 30px;
        background-color: red;
        color: white;
        border: none;
        cursor: pointer;
        margin-top: 20px;
      }
      .alien {
        font-size: 100px;
        animation: voar 3s infinite;
        display: inline-block;
      }
      @keyframes piscar {
        0%   { opacity: 1; }
        50%  { opacity: 0; }
        100% { opacity: 1; }
      }
      @keyframes voar {
        0%   { transform: translateY(0px); }
        50%  { transform: translateY(-30px); }
        100% { transform: translateY(0px); }
      }
      @media (max-width: 600px) {
        h1 {
          font-size: 24px;
          margin-top: 30px;
        }
        .alien {
          font-size: 60px;
        }
        nav a {
          font-size: 15px;
          margin: 0 10px;
        }
        button {
          font-size: 16px;
          padding: 8px 20px;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="index.html">Início</a>
      <a href="sobre.html">Sobre</a>
      <a href="contato.html">Contato</a>
    </nav>
    <div class="alien">👽</div>
    <h1>Povo da terra! Estamos diante de um grande acontecimento mundial: a terra está sendo invadida por aliens!</h1>
    <p>GOV. BR</p>
    <button onclick="alerta()">Saiba Mais</button>
    <p style="color: white; font-size: 25px;">
      Alertas enviados: <span id="contador">0</span>
    </p>

    <audio id="musica" autoplay loop>
      <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <button onclick="tocarPausar()" style="
      position: fixed;
      bottom: 20px;
      right: 20px;
      font-size: 30px;
      background: none;
      border: none;
      cursor: pointer;
    ">🔊</button>

    <script>
      var count = 0;

      function alerta() {
        count++;
        document.getElementById("contador").innerText = count;
        alert("Os aliens chegam em 24 horas! Fuja!")
      }

      function tocarPausar() {
        var musica = document.getElementById("musica");
        if (musica.paused) {
          musica.play();
        } else {
          musica.pause();
        }
      }
    </script>
  </body>
</html>
