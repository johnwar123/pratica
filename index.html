<!DOCTYPE html>
<html>
  <head>
    <title>GRANDE NOTÍCIA</title>
    <style>
      body {
        background-color: black;
        color: red;
        text-align: center;
        font-family: Arial;
      }
      h1 {
        font-size: 40px;
        margin-top: 100px;
        animation: piscar 1s infinite;
      }
      p {
        font-size: 20px;
        color: white;
      }
      button {
        font-size: 20px;
        padding: 10px 30px;
        background-color: red;
        color: white;
        border: none;
        cursor: pointer;
        margin-top: 20px;
      }
      @keyframes piscar {
        0%   { opacity: 1; }
        50%  { opacity: 0; }
        100% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <h1>Povo da terra! Estamos diante de um grande acontecimento mundial: a terra está sendo invadida por aliens!</h1>
    <p>GOV. BR</p>
    <button onclick="alerta()">Saiba Mais</button>

    <script>
      function alerta() {
        alert("Os aliens chegam em 24 horas! Fuja!")
      }
    </script>
  </body>
</html>
