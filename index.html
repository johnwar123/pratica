<!DOCTYPE html>
<html>
  <head>
    <title>GRANDE NOTÍCIA</title>
    <style>
      body {
        background-color: black;
        color: red;
        text-align: center;
        font-family: Arial;
      }
      nav {
        background-color: red;
        padding: 15px;
      }
      nav a {
        color: white;
        text-decoration: none;
        font-size: 20px;
        margin: 0 20px;
      }
      nav a:hover {
        color: black;
      }
      h1 {
        font-size: 40px;
        margin-top: 50px;
        animation: piscar 1s infinite;
      }
      p {
        font-size: 20px;
        color: white;
      }
      button {
        font-size: 20px;
        padding: 10px 30px;
        background-color: red;
        color: white;
        border: none;
        cursor: pointer;
        margin-top: 20px;
      }
      .alien {
        font-size: 100px;
        animation: voar 3s infinite;
        display: inline-block;
      }
      @keyframes piscar {
        0%   { opacity: 1; }
        50%  { opacity: 0; }
        100% { opacity: 1; }
      }
      @keyframes voar {
        0%   { transform: translateY(0px); }
        50%  { transform: translateY(-30px); }
        100% { transform: translateY(0px); }
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="index.html">Início</a>
      <a href="sobre.html">Sobre</a>
    </nav>
    <div class="alien">👽</div>
    <h1>Povo da terra! Estamos diante de um grande acontecimento mundial: a terra está sendo invadida por aliens!</h1>
    <p>GOV. BR</p>
    <button onclick="alerta()">Saiba Mais</button>

    <script>
      function alerta() {
        alert("Os aliens chegam em 24 horas! Fuja!")
      }
    </script>
  </body>
</html>sobre.html
